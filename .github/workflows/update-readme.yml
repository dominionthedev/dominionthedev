name: Update README

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
    paths:
      - "README.md.tpl"
      - "scripts/*.py"
  repository_dispatch:
    types:
      - notes-updated
      - gist-created
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: copy README.md.tpl
        run: cp README.md.tpl README.tmp

      # ── Notes ─────────────────────────
      - name: Inject notes
        env:
          GITHUB_TOKEN: ${{ secrets.README_TOKEN }}
          NOTES_REPO:   dominionthedev/notes
          README_PATH:  README.tmp
        run: python scripts/inject_notes.py

      # ── Gists ─────────────────────────
      - name: Inject gists
        env:
          GITHUB_TOKEN: ${{ secrets.README_TOKEN }}
          USERNAME:     dominionthedev
          README_PATH:  README.tmp
        run: python scripts/inject_gist.py

      # ── Repos ─────────────────────────
      - name: Inject repos
        env:
          GITHUB_TOKEN: ${{ secrets.README_TOKEN }}
          USERNAME:     dominionthedev
          ORG_NAME:     leraniode
          README_PATH:  README.tmp
        run: python scripts/inject_repos.py

      # ── Render ────────────────────────
      - name: Render README
        env:
          TPL_PATH:    README.tmp
          README_PATH: README.md
        run: python scripts/render_readme.py

      - name: Remove temporary file
        run: rm README.tmp

      # ── Commit ────────────────────────
      - name: Commit & push manually
        run: |
          git config user.name "Dominionthedeveloper"
          git config user.email "Dominionthedeveloper@gmail.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "chore: update README [automated]"

          git push https://x-access-token:${{ secrets.README_TOKEN }}@github.com/${{ github.repository }}
