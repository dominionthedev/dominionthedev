name: Update README

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
    paths:
      - "README.md.tpl"
      - "scripts/inject_notes.py"
      - "scripts/inject_gist.py"
  repository_dispatch:
    types:
      - notes-updated
      - gist-created
  workflow_dispatch:

jobs:
  update-readme:
    name: Update README.md
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Step 1: Inject Notes ──────────────────────────────────────────────
      - name: Inject notes into README
        env:
          GITHUB_TOKEN: ${{ secrets.README_TOKEN }}
          NOTES_REPO:   dominionthedev/notes
          README_PATH:  README.md.tpl
          MAX_NOTES:    "5"
          SKIP_FILES:   "README.md,about_me.md,projects.md,task.md"
        run: python scripts/inject_notes.py

      # ── Step 1.5: Inject Gists ────────────────────────────────────────────
      - name: Inject gists into README
        env:
          GITHUB_TOKEN: ${{ secrets.README_TOKEN }}
          USERNAME:     dominionthedev
          README_PATH:  README.md.tpl
          MAX_GISTS:    "3"
        run: python scripts/inject_gist.py

      # ── Step 2: Render Template ───────────────────────────────────────────
      - name: Render README template with markscribe
        uses: muesli/readme-scribe@master
        env:
          GITHUB_TOKEN: ${{ secrets.README_TOKEN }}
        with:
          template: "README.md.tpl"
          writeTo:  "README.md"

      # ── Step 3: commit if anything changed ───────────────────────────────
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update README [automated]"
          commit_author:  "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          file_pattern:   README.md
