<svg width="480" height="120" viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ag-nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4ccf0;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#d4ccf0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b87aff;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="ag-lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b87aff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#b87aff;stop-opacity:0.55" />
      <stop offset="100%" style="stop-color:#b87aff;stop-opacity:0" />
    </linearGradient>

    <filter id="ag-glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="ag-softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for text reveal (typing effect) -->
    <clipPath id="ag-textReveal">
      <rect x="0" y="0" width="0" height="80">
        <animate
          attributeName="width"
          from="0" to="480"
          dur="1.4s"
          begin="0.3s"
          fill="freeze"
          calcMode="spline"
          keySplines="0.4 0 0.2 1"
          keyTimes="0;1"/>
      </rect>
    </clipPath>

    <!-- Clip for tagline reveal -->
    <clipPath id="ag-tagReveal">
      <rect x="0" y="70" width="0" height="40">
        <animate
          attributeName="width"
          from="0" to="480"
          dur="0.9s"
          begin="1.5s"
          fill="freeze"
          calcMode="spline"
          keySplines="0.4 0 0.2 1"
          keyTimes="0;1"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Prompt prefix — fades in first -->
  <text
    x="16"
    y="58"
    font-family="'JetBrains Mono', 'Fira Code', monospace"
    font-size="22"
    font-weight="700"
    fill="#b87aff"
    filter="url(#ag-glow)"
    opacity="0">
    ~›
    <animate attributeName="opacity" from="0" to="0.9" dur="0.3s" begin="0.1s" fill="freeze"/>
  </text>

  <!-- Name — typed in via clip reveal -->
  <g clip-path="url(#ag-textReveal)">
    <text
      x="62"
      y="62"
      font-family="'JetBrains Mono', 'Fira Code', monospace"
      font-size="34"
      font-weight="700"
      letter-spacing="1"
      fill="url(#ag-nameGrad)"
      filter="url(#ag-softGlow)">DominionDev</text>
  </g>

  <!-- Cursor / — blinks after typing, then settles -->
  <text
    x="390"
    y="62"
    font-family="'JetBrains Mono', 'Fira Code', monospace"
    font-size="34"
    font-weight="300"
    fill="#b87aff"
    filter="url(#ag-glow)"
    opacity="0">
    /
    <!-- Appear after typing -->
    <animate attributeName="opacity" from="0" to="0.9" dur="0.1s" begin="1.65s" fill="freeze"/>
    <!-- Blink 4 times -->
    <animate attributeName="opacity"
      values="0.9;0;0.9;0;0.9;0;0.9;0;0.9"
      dur="1.6s"
      begin="1.7s"
      fill="freeze"/>
  </text>

  <!-- Separator line — draws in after name -->
  <line x1="16" y1="74" x2="464" y2="74"
    stroke="url(#ag-lineGrad)"
    stroke-width="1"
    stroke-linecap="round"
    stroke-dasharray="448"
    stroke-dashoffset="448">
    <animate
      attributeName="stroke-dashoffset"
      from="448" to="0"
      dur="0.6s"
      begin="1.65s"
      fill="freeze"
      calcMode="spline"
      keySplines="0.4 0 0.2 1"
      keyTimes="0;1"/>
  </line>

  <!-- Tagline — fades in last -->
  <g clip-path="url(#ag-tagReveal)">
    <text
      x="62"
      y="96"
      font-family="'JetBrains Mono', 'Fira Code', monospace"
      font-size="9.5"
      font-weight="400"
      letter-spacing="3.5"
      fill="#b87aff"
      opacity="0.45">SOLO DEV · FOSS LOVER · TERMINAL NATIVE</text>
  </g>

  <!-- Subtle pulse glow on the whole name — ongoing after intro -->
  <text
    x="62"
    y="62"
    font-family="'JetBrains Mono', 'Fira Code', monospace"
    font-size="34"
    font-weight="700"
    letter-spacing="1"
    fill="none"
    stroke="#b87aff"
    stroke-width="0"
    opacity="0">
    DominionDev
    <!-- Start glow pulse after intro completes -->
    <animate attributeName="opacity" from="0" to="0.12" dur="0.4s" begin="3.4s" fill="freeze"/>
    <animate attributeName="stroke-width"
      values="0;4;0"
      dur="3s"
      begin="3.4s"
      repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0.12;0.05;0.12"
      dur="3s"
      begin="3.4s"
      repeatCount="indefinite"/>
  </text>

</svg>
