<svg width="720" height="200" viewBox="0 0 720 200" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Mask so line passes through text properly -->
    <mask id="textMask">
      <rect width="100%" height="100%" fill="white"/>

      <!-- cut lower half of text so line appears through it -->
      <text x="680"
            y="120"
            text-anchor="end"
            font-size="52"
            font-family="Segoe UI, Helvetica, Arial, sans-serif"
            font-weight="600"
            fill="black">
        DominionDev
      </text>

      <!-- restore lower portion -->
      <rect x="0" y="130" width="720" height="100" fill="white"/>

    </mask>

  </defs>

  <!-- Line -->
  <line x1="40"
        y1="130"
        x2="680"
        y2="130"
        stroke="#7a7a7a"
        stroke-width="2"
        stroke-linecap="round"
        mask="url(#textMask)"/>

  <!-- Full text -->
  <text x="680"
        y="120"
        text-anchor="end"
        fill="#7a7a7a"
        font-size="52"
        font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-weight="600">
    DominionDev
  </text>

  <!-- Refined bulb -->
  <g transform="translate(100,110)"
     stroke="#7a7a7a"
     stroke-width="2"
     fill="none">

    <path d="M0 -30 C-18 -30 -28 -18 -28 -4 C-28 12 -18 18 -10 26 L10 26 C18 18 28 12 28 -4 C28 -18 18 -30 0 -30 Z"/>
    <path d="M-7 -2 Q0 8 7 -2"/>
    <rect x="-9" y="26" width="18" height="8" rx="2"/>

    <line x1="0" y1="-42" x2="0" y2="-55"/>
    <line x1="24" y1="-30" x2="36" y2="-40"/>
    <line x1="-24" y1="-30" x2="-36" y2="-40"/>

  </g>

</svg>