<svg width="680" height="160" viewBox="0 0 680 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4ccf0;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#d4ccf0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b87aff;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a2245;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#b87aff;stop-opacity:0.6" />
      <stop offset="80%" style="stop-color:#b87aff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#2a2245;stop-opacity:0" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Prompt symbol > -->
  <text
    x="38"
    y="94"
    font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
    font-size="28"
    font-weight="700"
    fill="#b87aff"
    filter="url(#glow)"
    opacity="0.9">~</text>

  <!-- Divider slash -->
  <text
    x="68"
    y="94"
    font-family="'JetBrains Mono', 'Fira Code', monospace"
    font-size="28"
    font-weight="400"
    fill="#2a2245"
    opacity="0.9">›</text>

  <!-- Main name -->
  <text
    x="92"
    y="98"
    font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
    font-size="42"
    font-weight="700"
    letter-spacing="1"
    fill="url(#nameGrad)"
    filter="url(#subtleGlow)">DominionDev</text>

  <!-- Blinking cursor / -->
  <text
    x="604"
    y="98"
    font-family="'JetBrains Mono', 'Fira Code', monospace"
    font-size="42"
    font-weight="300"
    fill="#b87aff"
    opacity="0.85"
    filter="url(#glow)">/</text>

  <!-- Thin rule below -->
  <line
    x1="38" y1="116"
    x2="642" y2="116"
    stroke="url(#lineGrad)"
    stroke-width="1"
    stroke-linecap="round"/>

  <!-- Tagline -->
  <text
    x="92"
    y="138"
    font-family="'JetBrains Mono', 'Fira Code', monospace"
    font-size="12"
    font-weight="400"
    letter-spacing="3"
    fill="#b87aff"
    opacity="0.5">SOLO DEV · FOSS LOVER · TERMINAL NATIVE</text>

</svg>
